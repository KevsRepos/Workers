resolver 127.0.0.11 valid=10s;

upstream frontend {
    zone frontend 64k;
    server node:3000 resolve;
}

server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name localhost;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Variable erzwingt DNS-Auflösung bei jeder Anfrage (kein IP-Caching nach Container-Neustart)
    set $php_backend php:9000;

    # Symfony unter /workers/
    location /workers/ {
        rewrite ^/workers(/.*)$ $1 break;
        try_files $uri @workers_php;
    }

    location ~ ^/workers/.+.php$ {
        include fastcgi_params;
        fastcgi_pass $php_backend;
        fastcgi_param SCRIPT_FILENAME /var/www/workers/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/workers/backend/public;
        fastcgi_param REQUEST_URI $uri;
    }

    location @workers_php {
        include fastcgi_params;
        fastcgi_pass $php_backend;
        fastcgi_param SCRIPT_FILENAME /var/www/workers/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/workers/backend/public;
        fastcgi_param REQUEST_URI $uri;
    }

    # Alles andere -> Node (DNS wird zur Laufzeit aufgelöst)
    location / {
        proxy_pass http://frontend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
    }
}

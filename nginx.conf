# Nginx reverse proxy for SvelteKit frontend and PHP backend
# Assumes backend is available as 'backend:80' and frontend as 'frontend:3000' in docker-compose

server {
    listen 80;
    server_name _;

    # Proxy /workers/api/* to PHP backend
    location /workers/api/ {
        proxy_pass http://backend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Everything else goes to SvelteKit frontend
    location / {
        proxy_pass http://frontend:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

version: '3.8'

services:
  mariadb:
    image: mariadb:10.3
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db
      MYSQL_USER: db
      MYSQL_PASSWORD: "123456"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 12

  php:
    build:
      context: ./backend
    image: workers-backend:latest
    working_dir: /var/www/workers/backend
    depends_on:
      - mariadb

  mkcert:
    image: ubuntu:22.04
    volumes:
      - ./certs:/certs
      - /home/wonderbear/.local/share/mkcert:/root/.local/share/mkcert:ro
      - /usr/local/bin/mkcert:/usr/local/bin/mkcert:ro
    working_dir: /certs
    command: /bin/sh -c "/usr/local/bin/mkcert -cert-file /certs/91.151.16.155.pem -key-file /certs/91.151.16.155-key.pem 91.151.16.155 localhost || true"
    restart: "no"

  

  nginx:
    image: nginx:stable
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/var/www:ro
    depends_on:
      - php
      - node
      - mkcert
    command: /bin/sh -c "sed -i 's/127.0.0.1:3000/node:3000/g' /etc/nginx/conf.d/default.conf || true && nginx -g 'daemon off;'"

  node:
    build:
      context: ./frontend
    image: workers-frontend:latest
    working_dir: /var/www/workers/frontend
    ports:
      - "3000:3000"
    # wait until build exists (created during image build)
    command: /bin/sh -c "while [ ! -f /var/www/migrate_state/done ]; do echo 'waiting for migrations...'; sleep 1; done; while [ ! -f build/index.js ]; do echo 'waiting for build...'; sleep 1; done; node build/index.js"
    depends_on:
      - setup-migrate
    volumes:
      - migrate_state:/var/www/migrate_state:rw

  setup-migrate:
    image: workers-backend:latest
    working_dir: /var/www/workers/backend
    command: /bin/sh -c "set -eux; until nc -z mariadb 3306; do echo 'waiting for mariadb...'; sleep 1; done; php bin/console doctrine:migrations:migrate --no-interaction; mkdir -p /var/www/migrate_state; touch /var/www/migrate_state/done"
    depends_on:
      - mariadb
      - php
    restart: "no"

volumes:
  db_data:
  migrate_state:
  

networks:
  default:
    driver: bridge

version: '3.8'

services:
  mariadb:
    image: mariadb:10.3
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db
      MYSQL_USER: db
      MYSQL_PASSWORD: "123456"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 12

  php:
    build:
      context: ./backend
    image: workers-backend:latest
    working_dir: /var/www/workers/backend
    depends_on:
      - mariadb
    volumes:
      - ./backend/config/jwt:/var/www/workers/backend/config/jwt:rw
    command: /bin/sh -c "mkdir -p config/jwt; if [ ! -f config/jwt/private.pem ] && [ ! -f config/jwt/public.pem ]; then php bin/console lexik:jwt:generate-keypair --no-interaction; chown -R www-data:www-data config/jwt || true; fi; php-fpm -F"
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z 127.0.0.1 9000"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 5s

  nginx:
    image: nginx:stable
    volumes:
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      php:
        condition: service_healthy
      node:
        condition: service_healthy
    command: /bin/sh -c "nginx -g 'daemon off;'"

  node:
    build:
      context: ./frontend
    image: workers-frontend:latest
    working_dir: /app
    ports:
      - "3000:3000"
    # wait until build exists (created during image build)
    command: /bin/sh -c "until nc -z php 9000; do echo 'waiting for php-fpm...'; sleep 1; done; while [ ! -f /var/www/migrate_state/done ]; do echo 'waiting for migrations...'; sleep 1; done; while [ ! -f build/index.js ]; do echo 'waiting for build...'; sleep 1; done; node build/index.js"
    depends_on:
      - setup-migrate
      - php
    volumes:
      - migrate_state:/var/www/migrate_state:rw

  setup-migrate:
    image: workers-backend:latest
    working_dir: /var/www/workers/backend
    command: /bin/sh -c "set -eux; until nc -z mariadb 3306; do echo 'waiting for mariadb...'; sleep 1; done; php bin/console doctrine:migrations:migrate --no-interaction; mkdir -p /var/www/migrate_state; touch /var/www/migrate_state/done"
    depends_on:
      - mariadb
      - php
    restart: "no"
    volumes:
      - migrate_state:/var/www/migrate_state:rw

volumes:
  db_data:
  migrate_state:
  

networks:
  default:
    driver: bridge

services:
  mariadb:
    image: mariadb:10.3
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db
      MYSQL_USER: db
      MYSQL_PASSWORD: "123456"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 12

  php:
    build:
      context: ./backend
    image: workers-backend:latest
    working_dir: /var/www/workers/backend
    depends_on:
      - mariadb
    volumes:
      - ./backend/config/jwt:/var/www/workers/backend/config/jwt:rw
    command: /bin/sh -c "mkdir -p config/jwt; if [ ! -f config/jwt/private.pem ] && [ ! -f config/jwt/public.pem ]; then php bin/console lexik:jwt:generate-keypair --no-interaction; chown -R www-data:www-data config/jwt || true; fi; php-fpm -F"
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z 127.0.0.1 9000"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 5s

  setup-certbot:
    image: certbot/certbot:latest
    dns:
      - 8.8.8.8
      - 1.1.1.1
    # standalone: certbot öffnet selbst Port 80, kein nginx nötig.
    # Nginx startet danach direkt mit dem echten Cert.
    command: certonly --standalone -d ${DOMAIN} --email ${CERTBOT_EMAIL} --agree-tos --non-interactive --keep-until-expiring
    ports:
      - "80:80"
    volumes:
      - ssl_certs:/etc/letsencrypt
    restart: "no"

  nginx:
    container_name: nginx
    image: nginx:stable
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - ssl_certs:/etc/nginx/ssl:ro
    environment:
      - DOMAIN=${DOMAIN}
    depends_on:
      setup-certbot:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "test -f /var/run/nginx.pid"]
      interval: 5s
      timeout: 2s
      retries: 5
    command: /bin/sh -c "envsubst '$$DOMAIN' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf && exec nginx -g 'daemon off;'"

  renew-ssl:
    image: certbot/certbot:latest
    dns:
      - 8.8.8.8
      - 1.1.1.1
    entrypoint: /bin/sh -c 'trap exit TERM; while :; do certbot renew --standalone --quiet; curl -sf --unix-socket /var/run/docker.sock -X POST "http://localhost/containers/nginx/kill?signal=HUP" || true; sleep 12h & wait $${!}; done'
    ports:
      - "80:80"
    volumes:
      - ssl_certs:/etc/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - nginx

  node:
    build:
      context: ./frontend
    image: workers-frontend:latest
    working_dir: /app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      setup-migrate:
        condition: service_started
      php:
        condition: service_healthy
    volumes:
      - migrate_state:/var/www/migrate_state:rw
      - ssl_certs:/ssl:ro
    # Entrypoint will import mounted CA if present
    environment:
      - NODE_TLS_REJECT_UNAUTHORIZED=0

  setup-migrate:
    image: workers-backend:latest
    working_dir: /var/www/workers/backend
    command: /bin/sh -c "set -eux; until nc -z mariadb 3306; do echo 'waiting for mariadb...'; sleep 1; done; php bin/console doctrine:migrations:migrate --no-interaction; mkdir -p /var/www/migrate_state; touch /var/www/migrate_state/done"
    depends_on:
      - mariadb
      - php
    restart: "no"
    volumes:
      - migrate_state:/var/www/migrate_state:rw

volumes:
  db_data:
  migrate_state:
  ssl_certs:
  

networks:
  default:
    driver: bridge

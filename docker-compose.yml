services:
  mariadb:
    image: mariadb:10.3
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db
      MYSQL_USER: db
      MYSQL_PASSWORD: "123456"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 12

  php:
    build:
      context: ./backend
    image: workers-backend:latest
    working_dir: /var/www/workers/backend
    depends_on:
      - mariadb
    volumes:
      - ./backend/config/jwt:/var/www/workers/backend/config/jwt:rw
    command: /bin/sh -c "mkdir -p config/jwt; if [ ! -f config/jwt/private.pem ] && [ ! -f config/jwt/public.pem ]; then php bin/console lexik:jwt:generate-keypair --no-interaction; chown -R www-data:www-data config/jwt || true; fi; php-fpm -F"
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z 127.0.0.1 9000"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 5s

  setup-ssl:
    image: alpine:3
    # Erstellt ein selbst-signiertes Zertifikat am letsencrypt-Pfad,
    # damit nginx starten kann. Wird übersprungen wenn Cert bereits existiert.
    command: /bin/sh -c "if [ ! -f /ssl/live/${DOMAIN}/fullchain.pem ]; then apk add --no-cache openssl && mkdir -p /ssl/live/${DOMAIN} && openssl req -x509 -nodes -days 1 -newkey rsa:2048 -keyout /ssl/live/${DOMAIN}/privkey.pem -out /ssl/live/${DOMAIN}/fullchain.pem -subj '/CN=${DOMAIN}'; fi"
    volumes:
      - ssl_certs:/ssl
    restart: "no"

  setup-certbot:
    image: certbot/certbot:latest
    dns:
      - 8.8.8.8
      - 1.1.1.1
    # Holt das echte Let's-Encrypt-Cert via webroot (nginx läuft bereits).
    # Lädt nginx danach neu. Überspringt wenn Cert noch gültig ist.
    entrypoint: /bin/sh -c "apk add --no-cache docker-cli --quiet && certbot certonly --webroot --webroot-path=/var/www/certbot -d ${DOMAIN} --email ${CERTBOT_EMAIL} --agree-tos --non-interactive --keep-until-expiring && docker exec nginx nginx -s reload"
    volumes:
      - ssl_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
      - /var/run/docker.sock:/var/run/docker.sock
    restart: "no"
    depends_on:
      nginx:
        condition: service_healthy

  nginx:
    container_name: nginx
    image: nginx:stable
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/templates/default.conf.template:ro
      - ssl_certs:/etc/nginx/ssl:ro
      - certbot_webroot:/var/www/certbot:ro
    environment:
      - DOMAIN=${DOMAIN}
    depends_on:
      setup-ssl:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "test -f /var/run/nginx.pid"]
      interval: 5s
      timeout: 2s
      retries: 5
    command: /bin/sh -c "envsubst '$$DOMAIN' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf && exec nginx -g 'daemon off;'"

  renew-ssl:
    image: certbot/certbot:latest
    dns:
      - 8.8.8.8
      - 1.1.1.1
    # Webroot-Renewal: nginx bleibt oben, kein Port-Konflikt.
    # Nach Erneuerung: nginx via Docker-Socket automatisch neu laden.
    entrypoint: /bin/sh -c 'apk add --no-cache docker-cli --quiet; trap exit TERM; while :; do certbot renew --webroot --webroot-path=/var/www/certbot --quiet --deploy-hook "docker exec nginx nginx -s reload"; sleep 12h & wait $${!}; done'
    volumes:
      - ssl_certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - nginx

  node:
    build:
      context: ./frontend
    image: workers-frontend:latest
    working_dir: /app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      setup-migrate:
        condition: service_started
      php:
        condition: service_healthy
    volumes:
      - migrate_state:/var/www/migrate_state:rw
      - ssl_certs:/ssl:ro
    # Entrypoint will import mounted CA if present
    environment:
      - NODE_TLS_REJECT_UNAUTHORIZED=0

  setup-migrate:
    image: workers-backend:latest
    working_dir: /var/www/workers/backend
    command: /bin/sh -c "set -eux; until nc -z mariadb 3306; do echo 'waiting for mariadb...'; sleep 1; done; php bin/console doctrine:migrations:migrate --no-interaction; mkdir -p /var/www/migrate_state; touch /var/www/migrate_state/done"
    depends_on:
      - mariadb
      - php
    restart: "no"
    volumes:
      - migrate_state:/var/www/migrate_state:rw

volumes:
  db_data:
  migrate_state:
  ssl_certs:
  certbot_webroot:
  

networks:
  default:
    driver: bridge

services:
  mariadb:
    image: mariadb:10.3
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: db
      MYSQL_USER: db
      MYSQL_PASSWORD: "123456"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 12

  php:
    build:
      context: ./backend
    image: workers-backend:latest
    working_dir: /var/www/workers/backend
    depends_on:
      - mariadb
    volumes:
      - ./backend/config/jwt:/var/www/workers/backend/config/jwt:rw
    command: /bin/sh -c "mkdir -p config/jwt; if [ ! -f config/jwt/private.pem ] && [ ! -f config/jwt/public.pem ]; then php bin/console lexik:jwt:generate-keypair --no-interaction; chown -R www-data:www-data config/jwt || true; fi; php-fpm -F"
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z 127.0.0.1 9000"]
      interval: 5s
      timeout: 2s
      retries: 5
      start_period: 5s

  setup-ssl:
    image: alpine:3
    command: /bin/sh -c "if [ ! -f /ssl/fullchain.pem ] || [ ! -f /ssl/privkey.pem ]; then apk add --no-cache openssl && openssl req -x509 -nodes -days 365 -newkey rsa:2048 -keyout /ssl/privkey.pem -out /ssl/fullchain.pem -subj '/CN=localhost' && cp /ssl/fullchain.pem /ssl/ca.pem; fi"
    volumes:
      - ssl_certs:/ssl
    restart: "no"

  nginx:
    image: nginx:stable
    ports:
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ssl_certs:/etc/nginx/ssl:ro
    depends_on:
      setup-ssl:
        condition: service_completed_successfully
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "test -f /var/run/nginx.pid"]
      interval: 5s
      timeout: 2s
      retries: 5
    command: /bin/sh -c "nginx -g 'daemon off;'"

  node:
    build:
      context: ./frontend
    image: workers-frontend:latest
    working_dir: /app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      setup-migrate:
        condition: service_started
      php:
        condition: service_healthy
    volumes:
      - migrate_state:/var/www/migrate_state:rw
      - ssl_certs:/ssl:ro
    # Entrypoint will import mounted CA if present
    environment:
      - NODE_TLS_REJECT_UNAUTHORIZED=0

  setup-migrate:
    image: workers-backend:latest
    working_dir: /var/www/workers/backend
    command: /bin/sh -c "set -eux; until nc -z mariadb 3306; do echo 'waiting for mariadb...'; sleep 1; done; php bin/console doctrine:migrations:migrate --no-interaction; mkdir -p /var/www/migrate_state; touch /var/www/migrate_state/done"
    depends_on:
      - mariadb
      - php
    restart: "no"
    volumes:
      - migrate_state:/var/www/migrate_state:rw

volumes:
  db_data:
  migrate_state:
  ssl_certs:
  

networks:
  default:
    driver: bridge
